name: CloudScale CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  ACR_LOGIN_SERVER: cloudscaleacr.azurecr.io
  IMAGE_NAME: cloudscale
  AKS_CLUSTER_NAME: CloudScale-AKS
  RESOURCE_GROUP: CloudScale-RG

jobs:
  
  build-test:
    name: Build & Test Application
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Test Docker Build Locally
        uses: docker/build-push-action@v5
        with:
          context: .
          load: true 
          tags: ${{ env.IMAGE_NAME }}:test

  # JOB 2: Push to ACR (Only runs on Main merge/push)
  push-to-acr:
    name: Build & Push to Azure Container Registry
    needs: build-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}       
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}      
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}

      - name: Log in to Azure Container Registry
        run: |
          az acr login --name ${{ env.ACR_LOGIN_SERVER }}

      - name: Build and Push Production Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:latest

  # Job 3: Deploy to AKS (Only runs on Main merge/push)
  deploy-to-aks:
    name: Deploy to Azure Kubernetes Service
    needs: push-to-acr
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: production 
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}

      - name: Set AKS Context
        uses: azure/aks-set-context@v3
        with:
          resource-group: ${{ env.RESOURCE_GROUP }}
          cluster-name: ${{ env.AKS_CLUSTER_NAME }}

      - name: Deploy Manifests
        run: |
          kubectl apply -f k8s/