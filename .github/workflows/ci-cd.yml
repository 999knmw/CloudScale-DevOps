name: CloudScale CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  ACR_NAME: cloudscaleacr
  ACR_LOGIN_SERVER: cloudscaleacr.azurecr.io
  IMAGE_NAME: cloudscale
  AKS_CLUSTER_NAME: CloudScale-AKS
  RESOURCE_GROUP: CloudScale-RG

jobs:
  
  # JOB 1: Build & Test (Runs on PRs and main pushes)
  build-test:
    name: Build & Test Application
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Test Docker Build Locally
        uses: docker/build-push-action@v5
        with:
          context: .
          load: true 
          tags: ${{ env.IMAGE_NAME }}:test

  # NEW JOB 2: Provision Infrastructure via Terraform (Only runs on Main merge/push)
  provision-infra:
    name: Provision Infrastructure (Terraform)
    needs: build-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.SECRETS }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.0 

      - name: Terraform Init & Apply
        run: |
          terraform init
          terraform apply -auto-approve

  # JOB 3: Push to ACR 
  push-to-acr:
    name: Build & Push to Azure Container Registry
    needs: provision-infra 
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.SECRETS }} 

      - name: Log in to Azure Container Registry
        run: |
          az acr login --name ${{ env.ACR_NAME }} # Optimized to use resource name directly

      - name: Build and Push Production Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:latest

  # JOB 4: Deploy to AKS (Only runs on Main merge/push after image is built)
  deploy-to-aks:
    name: Deploy to Azure Kubernetes Service
    needs: push-to-acr
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: production 
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.SECRETS }} 

      - name: Set AKS Context
        uses: azure/aks-set-context@v3
        with:
          resource-group: ${{ env.RESOURCE_GROUP }}
          cluster-name: ${{ env.AKS_CLUSTER_NAME }}

      - name: Create Image Pull Secret in AKS
        run: |
          kubectl create secret docker-registry acr-secret \
            --docker-server=${{ env.ACR_LOGIN_SERVER }} \
            --docker-username=${{ env.ACR_NAME }} \
            --docker-password=${{ secrets.ACR_PASSWORD }} \
            --docker-email=student@limu.edu.ly \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy Manifests
        run: |
          # Replaces the placeholder image tag in deployment template with the actual commit SHA
          sed -i "s|image: .*|image: ${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.sha }}|g" k8s/deployment.yaml
          kubectl apply -f k8s/